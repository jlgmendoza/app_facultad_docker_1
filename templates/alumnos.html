<html>

<head>
    <title>Coding with Roby</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
</head>

<body>
    <p> {{name}} </p>
    <!-- Guardamos el JSON de forma segura en un atributo 'data-' -->
    <table class="table">
        <tr>
            <th>Nombre Alumno</th>
            <th>Fecha de Nacimiento</th>
            <th>NIF o NIE</th>
        </tr>
       
        {% for alumno in alumnos %}
        <tr>
            <td>
                {{alumno.nombre}}
            </td>
            <td>
                {{alumno.fechaNacimiento}}
            </td>
            <td>
                {{alumno.NIF}} 
            </td>
        </tr>
        {% endfor %}
    </table>
      <script>
        // Jinja2 transforma la lista a texto JSON y 'safe' limpia las comillas
        console.log("JSON de alumnos recibido en la plantilla:", '{{ alumnos | tojson | safe }}');
        const alumnosData = JSON.parse(`{{ alumnos | tojson | safe }}`);
        // Se visualiza correctamente en la consola del navegador
        console.log("Datos de alumnos cargados:", alumnosData);
    </script>
</body>
</html>
